name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: nf-core/setup-nextflow@v2
        with:
          version: '26.04.6'
      - uses: mamba-org/setup-micromamba@v2

      - name: Configure and validate
        run: |
          nextflow config -profile conda >/dev/null
          nextflow run . --samplesheet tests/fixtures/samplesheet.csv \
            --reference_dir tests/fixtures/reference/raw --validate_only true -profile conda

      - name: Complete stub run
        run: |
          nextflow run . --samplesheet tests/fixtures/samplesheet.csv \
            --reference_dir tests/fixtures/reference/raw --outdir test_results \
            --rebuild_reference true --index_cpus 2 \
            --index_memory '4 GB' --tximport_memory '4 GB' -profile conda -stub-run
          test -s test_results/tximport/gene_counts.tsv
          test -s test_results/tximport/gene_length.tsv
          test -s test_results/summary/gene_count_summary.tsv
          test -s test_results/summary/salmon_mapping_summary.tsv
          test -s test_results/qc/multiqc/multiqc_report.html
          test -s tests/fixtures/reference/derived/reference_manifest.tsv
          git diff --check
