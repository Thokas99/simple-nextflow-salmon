name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: nf-core/setup-nextflow@v2
        with:
          version: '26.04.6'
      - uses: mamba-org/setup-micromamba@v2

      - name: Configure and validate
        run: |
          nextflow config -profile conda >/dev/null
          bash tests/test_validation.sh
          python3 tests/test_salmon_metrics.py

      - name: Complete stub run
        run: |
          bash tests/test_stub_workflow.sh
          git diff --check
